<div class="admin-form-card">
  <div class="mb-4">
    <h1 class="h4 mb-1">New post</h1>
    <p class="text-muted small mb-0">Add a blog post. Optionally publish it so it appears on the blog list.</p>
  </div>
  <form method="post" action="/blog" enctype="application/x-www-form-urlencoded" class="blog-form">
    <div class="mb-4">
      <label for="post-title" class="form-label fw-semibold">Title</label>
      <input type="text" id="post-title" name="title" class="form-control form-control-lg" placeholder="Enter post title" required maxlength="255" autocomplete="off">
    </div>
    <div class="mb-4">
      <label for="post-body" class="form-label fw-semibold">Body</label>
      <textarea id="post-body" name="body" class="form-control" rows="14" placeholder="Write your post content here…" style="min-height: 280px;"></textarea>
      <div class="form-text">Supports plain text. Line breaks are preserved.</div>
    </div>
    <div class="mb-4">
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" name="published" value="1" id="post-published">
        <label class="form-check-label" for="post-published">Publish immediately</label>
      </div>
      <div class="form-text">When checked, the post will appear on the public blog. Leave unchecked to save as draft.</div>
    </div>
    <div class="d-flex flex-wrap gap-2 pt-2">
      <button type="submit" class="btn btn-primary px-4">Create post</button>
      <a href="/admin" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>

<style>
  .admin-form-card { max-width: 720px; }
  .admin-form-card .form-control:focus { border-color: #86b7fe; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); }
  .admin-form-card textarea.form-control { font-size: 0.9375rem; line-height: 1.6; resize: vertical; }
</style>
