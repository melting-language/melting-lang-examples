<div class="card card-admin">
  <div class="card-body">
    <h2 class="h5 fw-600 mb-4">{{ formTitle }}</h2>
    <form method="post" action="{{ formAction }}">
      {!! hiddenIdField !!}
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" value="{{ userName }}" placeholder="Username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="{{ passwordPlaceholder }}" autocomplete="new-password"{!! passwordRequiredAttr !!}>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-admin btn-admin-primary"><i class="fa fa-check me-1"></i> Save</button>
        <a href="/dashboard/users" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
