<div class="card card-admin">
  <div class="card-body">
    <h2 class="h5 fw-600 mb-4">{{ formTitle }}</h2>
    <form method="post" action="{{ formAction }}">
      {!! hiddenIdField !!}
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ categoryName }}" placeholder="Category name" required>
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Optional description">{{ categoryDescription }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-admin btn-admin-primary"><i class="fa fa-check me-1"></i> Save</button>
        <a href="/dashboard/categories" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
