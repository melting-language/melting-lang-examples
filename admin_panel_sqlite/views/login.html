<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card card-admin">
      <div class="card-body p-4">
        <h2 class="card-title fw-700 mb-1">Admin Login</h2>
        <p class="text-muted small mb-4">Sign in to access the dashboard</p>
        {!! errorHtml !!}
        <form method="post" action="/login">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn btn-admin btn-admin-primary w-100"><i class="fa fa-sign-in me-1"></i> Sign in</button>
        </form>
      </div>
    </div>
  </div>
</div>
